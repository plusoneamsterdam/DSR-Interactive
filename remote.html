<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Control</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <script src="/socket.io/socket.io.js"></script>
    <script src="libraries/p5.min.js"></script>
    <script src="src/controls.js"></script>

    <script>
        const socket = window.io();
        let isSetupComplete = false;
        let roomId = null;
        let isJoinedToRoom = false;

        function getRoomIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('room');
        }

        function sendControlUpdate() {
            if (typeof getControlsData === 'function' && isSetupComplete && isJoinedToRoom) {
                const data = getControlsData();
                socket.emit('send-to-display', data);
            }
        }

        socket.on('connect', () => {
            console.log('✓ Remote: CONNECTED to server');
            roomId = getRoomIdFromUrl();
            if (roomId && isSetupComplete) {
                socket.emit('join-remote', { roomId });
            }
        });

        socket.on('remote-join-success', (data) => {
            console.log('✓ Remote: Successfully joined room', data.roomId);
            isJoinedToRoom = true;
            sendControlUpdate();
        });

        socket.on('remote-join-failed', (data) => {
            console.error('✗ Remote: Failed to join room', data.error);
            alert('Failed to connect to display. Invalid room ID.');
        });

        socket.on('connect_error', (error) => {
            console.log('✗ Remote: CONNECTION ERROR:', error);
        });

        socket.on('disconnect', () => {
            console.log('✗ Remote: DISCONNECTED from server');
            isJoinedToRoom = false;
        });

        // Sync sliders when other remotes send updates
        socket.on('values-sync', (data) => {
            if (!data) return;

            // Update slider positions from received values
            if (data.size !== undefined) sizeSliderY = map(data.size, 10, 34, sizeSliderMinY, sizeSliderMaxY);
            if (data.density !== undefined) densitySliderX = map(data.density, 4, 30, densitySliderMinX, densitySliderMaxX);
            if (data.extrude !== undefined) extrudeSliderY = map(data.extrude, 0, 10, extrudeSliderMinY, extrudeSliderMaxY);
            if (data.visibility !== undefined) visibilitySliderY = map(data.visibility, 3, 10, visibilitySliderMinY, visibilitySliderMaxY);
            if (data.look !== undefined) {
                // Map smooth look value back to slider position
                lookSliderX = map(data.look, 1, 0, lookSliderMinX, lookSliderMaxX);
            }
            if (data.lines !== undefined) linesSliderX = map(data.lines, 0, 10, linesSliderMinX, linesSliderMaxX);
            if (data.colour !== undefined) colorSliderY = map(data.colour, 0, 10, colorSliderMinY, colorSliderMaxY);
            if (data.displayRotation !== undefined) {
                rotationSliderTargetX = data.displayRotation ? rotationSliderMaxX : rotationSliderMinX;
            }
        });

        // Override p5.js setup for remote control (smaller canvas)
        let originalSetup = undefined;

        function setup() {
            createCanvas(400, 650);
            isSetupComplete = true;
            roomId = getRoomIdFromUrl();

            // Join room after setup completes
            if (roomId && socket.connected && !isJoinedToRoom) {
                socket.emit('join-remote', { roomId });
            }
        }

        // Draw function is already defined in controls.js, just use it

        function checkSliderClick(sliderName, sliderX, sliderY, sliderRadius) {
            return dist(mouseX, mouseY, sliderX, sliderY) < sliderRadius;
        }

        function mousePressed() {
            if (!isJoinedToRoom) return; // Prevent control before joined

            draggingSizeSlider = false;
            draggingExtrudeSlider = false;
            draggingDensitySlider = false;
            draggingVisibilitySlider = false;
            draggingLookSlider = false;
            draggingLinesSlider = false;
            draggingColorSlider = false;
            draggingRotationSlider = false;

            if (checkSliderClick('look', lookSliderX, lookSliderY, lookSliderRadius)) draggingLookSlider = true;
            else if (checkSliderClick('visibility', visibilitySliderX, visibilitySliderY, visibilitySliderRadius)) draggingVisibilitySlider = true;
            else if (checkSliderClick('extrude', extrudeSliderX, extrudeSliderY, extrudeSliderRadius)) draggingExtrudeSlider = true;
            else if (checkSliderClick('lines', linesSliderX, linesSliderY, linesSliderRadius)) draggingLinesSlider = true;
            else if (checkSliderClick('rotation', rotationSliderX, rotationSliderY, rotationSliderRadius)) {
                draggingRotationSlider = true;
                rotationSliderDragStart = mouseX;
            }
            else if (checkSliderClick('color', colorSliderX, colorSliderY, colorSliderRadius)) draggingColorSlider = true;
            else if (checkSliderClick('density', densitySliderX, densitySliderY, densitySliderRadius)) draggingDensitySlider = true;
            else if (checkSliderClick('size', sizeSliderX, sizeSliderY, sizeSliderRadius)) draggingSizeSlider = true;
        }

        function mouseDragged() {
            if (!isJoinedToRoom) return; // Prevent control before joined

            if (draggingSizeSlider) sizeSliderY = constrain(mouseY, sizeSliderMinY, sizeSliderMaxY);
            else if (draggingExtrudeSlider) extrudeSliderY = constrain(mouseY, extrudeSliderMinY, extrudeSliderMaxY);
            else if (draggingDensitySlider) densitySliderX = constrain(mouseX, densitySliderMinX, densitySliderMaxX);
            else if (draggingVisibilitySlider) visibilitySliderY = constrain(mouseY, visibilitySliderMinY, visibilitySliderMaxY);
            else if (draggingRotationSlider) {
                rotationSliderTargetX = (mouseX > rotationSliderDragStart) ? rotationSliderMaxX : rotationSliderMinX;
            }
            else if (draggingLookSlider) lookSliderX = constrain(mouseX, lookSliderMinX, lookSliderMaxX);
            else if (draggingLinesSlider) linesSliderX = constrain(mouseX, linesSliderMinX, linesSliderMaxX);
            else if (draggingColorSlider) colorSliderY = constrain(mouseY, colorSliderMinY, colorSliderMaxY);

            sendControlUpdate();
        }

        function mouseReleased() {
            draggingSizeSlider = false;
            draggingExtrudeSlider = false;
            draggingDensitySlider = false;
            draggingVisibilitySlider = false;
            draggingRotationSlider = false;
            draggingLookSlider = false;
            draggingLinesSlider = false;
            draggingColorSlider = false;
        }
    </script>
</body>

</html>
